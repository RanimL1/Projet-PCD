# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/ecosurveillance?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# Server Configuration
# ===============================
server.port=8081
server.servlet.context-path=/
server.error.include-message=always

# ===============================
# JWT Configuration
# ===============================
jwt.secret=ec0Surv31ll@nceS3cr3tK3y2024ThatIsVeryLongAndSecureForHS256Algorithm
jwt.expiration=86400000

# ===============================
# Disable Security Auto Config
# ===============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ===============================
# App Configuration
# ===============================
spring.application.name=ecosurveillance

# ===============================
# File Storage
# ===============================
preuves.storage.path=C:/Users/GIGABYTE/Desktop/liaison/detection_main/detection_aoi

# ===============================
# Logging
# ===============================
logging.level.com.ecosurveillance=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.cache=false

# ===============================
# Upload
# ===============================
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=215MB

# ===============================
# Jackson
# ===============================
spring.jackson.time-zone=Africa/Tunis
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ===============================
# CORS
# ===============================
cors.allowed-origins=http://localhost:4200,http://localhost:8081
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true