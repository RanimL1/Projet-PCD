<div class="table-wrapper">
  <table class="infractions-table">
    <thead>
    <tr>
      <th>Etudiant</th>
      <th>Preuve</th>
      <th>Date</th>
      <th>Punition</th>
      <th>Status</th>
      <th *ngIf="!readOnly">Action</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let infraction of infractions"
        (click)="onEdit(infraction)"
        class="clickable-row"
        title="Cliquer pour modifier">
      <td class="bold-text">{{ getNomComplet(infraction) }}</td>

      <!-- ✅ Bouton qui émet viewProofs vers le parent -->
      <td>
        <button class="btn-view"
                (click)="openProofs(infraction.id); $event.stopPropagation()">
          Voir preuve
        </button>
      </td>

      <td>{{ infraction.date | date:'dd/MM/yy' }}</td>
      <td>{{ infraction.punitionDescription || '-' }}</td>
      <td>
          <span class="status-badge"
                [ngClass]="{
                  'terminee':   infraction.status === 'TERMINEE',
                  'en-cours':   infraction.status === 'EN_COURS',
                  'en-attente': infraction.status === 'EN_ATTENTE'
                }">
            {{ infraction.status }}
          </span>
      </td>
      <td *ngIf="!readOnly">
        <button
          class="btn-terminer"
          [disabled]="infraction.status !== 'EN_COURS'"
          (click)="onChangeStatus($event, infraction.id); $event.stopPropagation()"
          title="Marquer comme terminée">
          Valider
        </button>
        <span *ngIf="infraction.status === 'TERMINEE'" class="deja-terminee"></span>
      </td>
    </tr>
    </tbody>
  </table>
</div>
